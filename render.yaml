services:
  - type: web
    name: bitespeed-identity-reconciliation
    runtime: node
    buildCommand: npm install && npm run build && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: bitespeed-db
          property: connectionString
      - key: NODE_ENV
        value: production

databases:
  - name: bitespeed-db
    databaseName: bitespeed_db
    user: bitespeed_user
    plan: free
